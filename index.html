<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SML Inventory ERP — Step Media Ltd</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F6F4; --panel:#FFFFFF; --border:#E4E1DD; --border2:#EEECE9;
  --text:#161513; --muted:#6E6A63; --faint:#9C9890;
  --accent:#C74634; --accent-dark:#A93A2A; --accent-soft:#FBEDEA;
  --green:#3F7D5A; --green-soft:#E9F3EE;
  --orange:#B7770D; --orange-soft:#FBF3E2;
  --red:#C7402E; --red-soft:#FCEBE8;
  --blue:#2F6FBF; --blue-soft:#EAF1FA;
  --top:#211E1C; --top-text:#F5F3F0;
  --radius:8px; --shadow:0 1px 2px rgba(22,21,19,.05),0 4px 14px rgba(22,21,19,.05);
}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--text)}

/* ---------- LOGIN ---------- */
#loginWrap{position:fixed;inset:0;background:linear-gradient(160deg,#211E1C 0%,#3A2F2B 55%,#59352B 100%);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.login-card{background:var(--panel);border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.45);width:100%;max-width:400px;padding:36px 34px}
.login-mark{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.login-mark .lm{width:44px;height:44px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;letter-spacing:.5px}
.login-mark b{font-size:17px;display:block}
.login-mark span{color:var(--muted);font-size:12.5px}
.login-card h1{font-size:21px;margin-bottom:4px}
.login-card .sub{color:var(--muted);font-size:13.5px;margin-bottom:20px}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.lfield input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#FCFBFA}
.lfield input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,70,52,.12)}
#loginErr{display:none;background:var(--red-soft);color:var(--red);border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:14px}
.login-btn{width:100%;padding:11px;background:var(--accent);border:none;color:#fff;border-radius:8px;font-size:14.5px;font-weight:600}
.login-btn:hover{background:var(--accent-dark)}
.login-foot{margin-top:16px;text-align:center;color:var(--faint);font-size:12px}

/* ---------- TOPBAR ---------- */
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--top);color:var(--top-text);display:flex;align-items:center;gap:14px;padding:0 16px;z-index:50}
.tb-burger{display:none;background:none;border:none;color:var(--top-text);width:34px;height:34px;border-radius:7px;font-size:18px}
.tb-burger:hover{background:rgba(255,255,255,.1)}
.tb-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14.5px;white-space:nowrap}
.tb-brand .bm{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.tb-brand small{font-weight:400;color:#B9B4AC;font-size:12px}
.tb-spacer{flex:1}
.tb-clock{font-size:12.5px;color:#B9B4AC;white-space:nowrap}
.tb-user{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:5px 10px 5px 6px;border-radius:8px}
.tb-user .av{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700}
.tb-user .nm{font-size:12.5px;font-weight:600;line-height:1.1}
.tb-user .rl{font-size:10.5px;color:#B9B4AC;text-transform:uppercase;letter-spacing:.5px}
.tb-out{background:none;border:1px solid rgba(255,255,255,.18);color:var(--top-text);padding:6px 12px;border-radius:7px;font-size:12.5px}
.tb-out:hover{background:rgba(255,255,255,.1)}

/* ---------- LAYOUT ---------- */
.shell{display:flex;padding-top:52px;min-height:100vh}
.sidebar{width:236px;flex:none;background:var(--panel);border-right:1px solid var(--border);padding:14px 10px 20px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-label{font-size:10.5px;font-weight:700;letter-spacing:.9px;color:var(--faint);text-transform:uppercase;padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:none;background:none;border-radius:7px;color:var(--text);font-size:13.5px;font-weight:500;text-align:left;min-height:35px}
.nav-item svg{width:16px;height:16px;flex:none;color:var(--faint)}
.nav-item:hover{background:var(--bg)}
.nav-item.active{background:var(--accent-soft);color:var(--accent-dark);font-weight:600}
.nav-item.active svg{color:var(--accent)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;border-radius:20px;padding:1px 7px}
.main{flex:1;min-width:0;padding:22px 26px 60px;max-width:1340px}
.scrim{display:none;position:fixed;inset:52px 0 0;background:rgba(22,21,19,.4);z-index:39}
.scrim.open{display:block}

/* ---------- PAGE ---------- */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.page-head h1{font-size:21px;letter-spacing:-.2px}
.page-head p{color:var(--muted);font-size:13px;margin-top:3px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}
.crumb{font-size:12px;color:var(--faint);margin-bottom:4px}
.crumb b{color:var(--muted);font-weight:600}

/* ---------- COMPONENTS ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:7px;border:1px solid var(--border);background:var(--panel);font-size:13px;font-weight:600;color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
.btn-green:hover{filter:brightness(1.07)}
.btn-danger-soft{background:var(--red-soft);border-color:#F2C9C2;color:var(--red)}
.btn-danger-soft:hover{background:#F9DDD8}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.card h3{font-size:14.5px;margin-bottom:2px}
.card .sub{color:var(--muted);font-size:12.5px;margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.kpi{padding:16px 18px;border-top:3px solid var(--border)}
.kpi .label{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
.kpi .value{font-size:25px;font-weight:700;margin:6px 0 2px;letter-spacing:-.5px}
.kpi .delta{font-size:12px;color:var(--faint)}
.kpi.k-red{border-top-color:var(--red)}.kpi.k-red .value{color:var(--red)}
.kpi.k-green{border-top-color:var(--green)}.kpi.k-green .value{color:var(--green)}
.kpi.k-blue{border-top-color:var(--blue)}.kpi.k-blue .value{color:var(--blue)}
.kpi.k-orange{border-top-color:var(--orange)}.kpi.k-orange .value{color:var(--orange)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-box{position:relative;height:250px}
.legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin-bottom:8px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.callout{display:flex;gap:10px;align-items:flex-start;background:var(--orange-soft);border:1px solid #EFD9AC;border-radius:var(--radius);padding:12px 14px;font-size:13px;margin-bottom:18px}
.callout svg{width:17px;height:17px;flex:none;color:var(--orange);margin-top:1px}
.note{background:var(--blue-soft);border:1px solid #C9DCF2;border-radius:var(--radius);padding:11px 14px;font-size:12.5px;color:#274F7F;margin-bottom:16px}

.table-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#FAF9F7;text-align:left;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FCFBFA}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.muted{color:var(--faint)}
.type-cell{font-weight:600}
.pos{color:var(--green);font-weight:600}.neg{color:var(--red);font-weight:600}
.badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.5px;padding:2.5px 8px;border-radius:20px}
.badge.ok{background:var(--green-soft);color:var(--green)}
.badge.low{background:var(--orange-soft);color:var(--orange)}
.badge.out{background:var(--red-soft);color:var(--red)}
.badge.pending{background:var(--orange-soft);color:var(--orange)}
.badge.approved{background:var(--blue-soft);color:var(--blue)}
.badge.issued{background:var(--green-soft);color:var(--green)}
.badge.rejected{background:var(--red-soft);color:var(--red)}
.badge.running{background:var(--blue-soft);color:var(--blue)}
.badge.delivered{background:var(--green-soft);color:var(--green)}
.badge.closed{background:#EEECE9;color:var(--muted)}
.badge.admin{background:var(--accent-soft);color:var(--accent-dark)}
.badge.store{background:var(--blue-soft);color:var(--blue)}
.badge.viewer{background:#EEECE9;color:var(--muted)}
.badge.in{background:var(--green-soft);color:var(--green)}
.badge.outt{background:var(--red-soft);color:var(--red)}
.badge.ret{background:var(--blue-soft);color:var(--blue)}
.badge.adj{background:var(--orange-soft);color:var(--orange)}
.level{width:90px;height:6px;background:var(--border2);border-radius:6px;overflow:hidden}
.level i{display:block;height:100%;border-radius:6px}

.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:210px;max-width:420px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--faint)}
.input{width:100%;padding:8.5px 12px;border:1px solid var(--border);border-radius:7px;background:var(--panel)}
.search-wrap .input{padding-left:34px}
.input:focus,.select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,70,52,.1)}
.select{padding:8.5px 32px 8.5px 12px;border:1px solid var(--border);border-radius:7px;background:var(--panel);appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%236E6A63' fill='none' stroke-width='1.5'/></svg>");background-repeat:no-repeat;background-position:right 11px center}

/* ---------- MODAL ---------- */
#modalBackdrop{display:none;position:fixed;inset:0;background:rgba(22,21,19,.45);z-index:80;align-items:flex-start;justify-content:center;padding:6vh 16px;overflow-y:auto}
#modalBackdrop.open{display:flex}
#modalBox{background:var(--panel);border-radius:12px;box-shadow:0 24px 70px rgba(0,0,0,.3);width:100%;max-width:520px;padding:24px}
#modalBox.wide{max-width:760px}
#modalBox h3{font-size:16.5px;margin-bottom:3px}
#modalBox .sub{color:var(--muted);font-size:12.5px;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field .input,.field .select,.field textarea{width:100%}
.field textarea{padding:8.5px 12px;border:1px solid var(--border);border-radius:7px;resize:vertical;min-height:60px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
.hint{font-size:11.5px;color:var(--faint);margin-top:4px}

/* ---------- TOAST ---------- */
#toastWrap{position:fixed;bottom:20px;right:20px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--top);color:var(--top-text);padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:0 8px 22px rgba(0,0,0,.25);animation:tin .18s ease}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- TABS ---------- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{border:none;background:none;padding:9px 14px;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--accent-dark);border-bottom-color:var(--accent)}

/* ---------- SLIP ---------- */
#slipPrint{display:none}

/* ---------- VIEWS ---------- */
.view{display:none}
.view.active{display:block}

/* ---------- RESPONSIVE ---------- */
@media (max-width:980px){
  .sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .18s ease}
  .sidebar.open{transform:none;box-shadow:0 0 40px rgba(0,0,0,.25)}
  .tb-burger{display:block}
  .grid-2{grid-template-columns:1fr}
  .main{padding:16px 14px 60px}
  .tb-clock{display:none}
  .row-3{grid-template-columns:1fr}
  .tb-user .nm,.tb-user .rl{display:none}
  .tb-user .av{margin:0}
}
@media print{
  body.slip-mode .topbar,body.slip-mode .sidebar,body.slip-mode .main,body.slip-mode #modalBackdrop,body.slip-mode #toastWrap{display:none!important}
  body.slip-mode #slipPrint{display:block!important}
  body:not(.slip-mode) .topbar,body:not(.slip-mode) .sidebar,body:not(.slip-mode) .page-actions,body:not(.slip-mode) .filter-bar,body:not(.slip-mode) #loginWrap{display:none!important}
  body:not(.slip-mode) .shell{padding-top:0}
  body:not(.slip-mode) .main{max-width:none;padding:0}
  .card,.table-card{box-shadow:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-mark"><div class="lm">SM</div><div><b>SML Inventory ERP</b><span>Step Media Ltd</span></div></div>
    <h1>Sign in</h1>
    <div class="sub">Store &amp; materials management system</div>
    <div id="loginErr"></div>
    <form id="loginForm">
      <div class="lfield"><label for="lgUser">Email</label><input id="lgUser" type="email" autocomplete="username" required placeholder="name@sml.com"></div>
      <div class="lfield"><label for="lgPass">Password</label><input id="lgPass" type="password" autocomplete="current-password" required></div>
      <button type="submit" class="login-btn">Sign in</button>
    </form>
    <div class="login-foot">Sign in with your company account — accounts are managed by admin in Firebase</div>
  </div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <button class="tb-burger" id="hamburger">☰</button>
  <div class="tb-brand"><div class="bm">SM</div>SML Inventory ERP <small id="tbCompany">· Step Media Ltd</small></div>
  <div class="tb-spacer"></div>
  <div class="tb-clock" id="clock"></div>
  <div class="tb-user"><div class="av" id="userAv">?</div><div><div class="nm" id="userName">—</div><div class="rl" id="userRole">—</div></div></div>
  <button class="tb-out" onclick="logout()">Sign out</button>
</header>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="nav-label">Overview</div>
    <button class="nav-item" data-view="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Dashboard</button>
    <div class="nav-label">Inventory</div>
    <button class="nav-item" data-view="items"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>Items</button>
    <button class="nav-item" data-view="catalog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h18"/><path d="M7 12h14"/><path d="M11 19h10"/></svg>Categories &amp; Groups</button>
    <button class="nav-item" data-view="stockin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M4 21h16"/></svg>Stock In</button>
    <button class="nav-item" data-view="stockout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M4 3h16"/></svg>Stock Out</button>
    <button class="nav-item" data-view="returns"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>Returns</button>
    <button class="nav-item" data-view="adjustments"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21v-7"/><path d="M4 10V3"/><path d="M12 21v-9"/><path d="M12 8V3"/><path d="M20 21v-5"/><path d="M20 12V3"/><path d="M1 14h6"/><path d="M9 8h6"/><path d="M17 16h6"/></svg>Adjustments</button>
    <button class="nav-item" data-view="alerts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0-6 6v3.6L4 17h16l-2-4.4V9a6 6 0 0 0-6-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>Stock Alerts<span class="nav-badge" id="alertBadge">0</span></button>
    <div class="nav-label">Procurement</div>
    <button class="nav-item" data-view="requisitions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3h6a1 1 0 0 1 1 1v2H8V4a1 1 0 0 1 1-1z"/><rect x="5" y="5" width="14" height="16" rx="2"/><path d="M9 11h6"/><path d="M9 15h4"/></svg>Requisitions</button>
    <button class="nav-item" data-view="suppliers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h11v10H3z"/><path d="M14 10h4l3 3v4h-7z"/><circle cx="7" cy="18" r="1.6"/><circle cx="17" cy="18" r="1.6"/></svg>Suppliers</button>
    <button class="nav-item" data-view="procurers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="3.5"/><path d="M5 21c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg>Procurers</button>
    <div class="nav-label">Production</div>
    <button class="nav-item" data-view="jobs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Jobs &amp; Delivery</button>
    <button class="nav-item" data-view="requisitors"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 4a3.5 3.5 0 0 1 0 7"/><path d="M17.5 14.5c2.2.8 3.5 2.9 3.5 5.5"/></svg>Requisitors</button>
    <div class="nav-label">Insight</div>
    <button class="nav-item" data-view="reports"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20H2"/></svg>Reports</button>
    <div class="nav-label admin-only">Administration</div>

function doSave(){
  if(!DB) return;
  const ops = [[fdb.collection("erp").doc("main"), metaOf(DB)]];
  DB.txns.forEach(t => { if(!SAVED_TXN.has(t.id)){ ops.push([fdb.collection("erp_txns").doc(t.id), t]); SAVED_TXN.add(t.id); } });
  DB.audit.forEach(a => {
    if(!a.id) a.id = "a" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    if(!a.ts) a.ts = Date.now();
    if(!SAVED_AUDIT.has(a.id)){ ops.push([fdb.collection("erp_audit").doc(a.id), a]); SAVED_AUDIT.add(a.id); }
  });
  const commits = [];
  for(let i = 0; i < ops.length; i += 400){
    const b = fdb.batch();
    ops.slice(i, i+400).forEach(o => b.set(o[0], o[1]));
    commits.push(b.commit());
  }
  return Promise.all(commits).catch(e => { console.error(e); toast("Save failed — check internet connection"); });
}

async function loadData(){

      fdb.collection("erp_txns").get(),
      fdb.collection("erp_audit").orderBy("ts","desc").limit(500).get()
    ]);
    DB.txns = txSnap.docs.map(d => d.data()); sortTxns();

    SAVED_AUDIT = new Set(DB.audit.map(a => a.id));
  } else {
    DB = seedData();
    SAVED_TXN = new Set(); SAVED_AUDIT = new Set();
    await doSave();
  }

async function wipeColl(name){
  const s = await fdb.collection(name).get();
  const refs = s.docs.map(d => d.ref);
  for(let i = 0; i < refs.length; i += 400){
    const b = fdb.batch();
    refs.slice(i, i+400).forEach(r => b.delete(r));
    await b.commit();
  }
}

    const d = snap.data();
    if(d.client === CLIENT_ID) return;
    const txns = DB ? DB.txns : [], aud = DB ? DB.audit : [];

  });
  fdb.collection("erp_txns").onSnapshot(snap => {
    if(!currentUser || snap.metadata.hasPendingWrites) return;
    let changed = false;
    snap.docChanges().forEach(ch => {
      if(ch.type === "added" && !SAVED_TXN.has(ch.doc.id)){ DB.txns.push(ch.doc.data()); SAVED_TXN.add(ch.doc.id); changed = true; }
      if(ch.type === "removed" && SAVED_TXN.has(ch.doc.id)){ DB.txns = DB.txns.filter(t => t.id !== ch.doc.id); SAVED_TXN.delete(ch.doc.id); changed = true; }
    });
    if(changed){ sortTxns(); renderAll(); }
  });
}

/* ---------- charts (canvas, no library) ---------- */
function setupCanvas(c){
  const r = c.parentElement.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
  c.width = r.width*dpr; c.height = r.height*dpr;
  c.style.width = r.width+"px"; c.style.height = r.height+"px";
  const ctx = c.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0);
  return { ctx, W:r.width, H:r.height };
}
function axisFmt(v){
  if(Math.abs(v) >= 1000000) return (v/1000000).toFixed(1).replace(/\.0$/,"")+"M";
  if(Math.abs(v) >= 1000) return (v/1000).toFixed(1).replace(/\.0$/,"")+"k";
  return String(Math.round(v));
}
function drawLineChart(c, labels, series){
  const {ctx,W,H} = setupCanvas(c);
  let max = 0; series.forEach(s => s.data.forEach(v => { if(v>max) max=v; })); max = max||1; max *= 1.15;
  ctx.font = "11px sans-serif";
  let padL = 18; for(let i=0;i<=4;i++){ const w = ctx.measureText(axisFmt(max*i/4)).width+14; if(w>padL) padL=w; }
  const padR=10,padT=12,padB=24, iw=W-padL-padR, ih=H-padT-padB;
  ctx.textAlign="right"; ctx.textBaseline="middle";
  for(let i=0;i<=4;i++){
    const y = padT+ih-(ih*i/4);
    ctx.strokeStyle="#EEECE9"; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    ctx.fillStyle="#9C9890"; ctx.fillText(axisFmt(max*i/4), padL-6, y);
  }
  ctx.textAlign="center"; ctx.textBaseline="top";
  const step = Math.max(1, Math.ceil(labels.length/8));
  labels.forEach((lb,i)=>{ if(i%step===0){ const x = padL+iw*(labels.length===1?.5:i/(labels.length-1)); ctx.fillText(lb, x, H-padB+7); }});
  series.forEach(s => {
    ctx.strokeStyle = s.color; ctx.lineWidth = 2; ctx.beginPath();
    s.data.forEach((v,i)=>{ const x = padL+iw*(s.data.length===1?.5:i/(s.data.length-1)), y = padT+ih-(v/max)*ih; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.stroke();
    ctx.fillStyle = s.color;
    s.data.forEach((v,i)=>{ if(v>0){ const x = padL+iw*(s.data.length===1?.5:i/(s.data.length-1)), y = padT+ih-(v/max)*ih; ctx.beginPath(); ctx.arc(x,y,2.4,0,7); ctx.fill(); }});
  });
}
function drawBarChart(c, labels, values, color){
  const {ctx,W,H} = setupCanvas(c);
  let max = Math.max.apply(null, values.concat([1]))*1.15;
  ctx.font = "11px sans-serif";
  let padL = 18; for(let i=0;i<=4;i++){ const w = ctx.measureText(axisFmt(max*i/4)).width+14; if(w>padL) padL=w; }
  const padR=10,padT=12,padB=40, iw=W-padL-padR, ih=H-padT-padB;
  ctx.textAlign="right"; ctx.textBaseline="middle";
  for(let i=0;i<=4;i++){
    const y = padT+ih-(ih*i/4);
    ctx.strokeStyle="#EEECE9"; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    ctx.fillStyle="#9C9890"; ctx.fillText(axisFmt(max*i/4), padL-6, y);
  }
  const bw = Math.min(46, iw/values.length*.55);
  values.forEach((v,i)=>{
    const x = padL+iw*(i+.5)/values.length;
    ctx.fillStyle = color;
    const bh = (v/max)*ih;
    ctx.beginPath(); ctx.roundRect(x-bw/2, padT+ih-bh, bw, bh, [4,4,0,0]); ctx.fill();
    ctx.fillStyle="#6E6A63"; ctx.textAlign="center"; ctx.textBaseline="top";
    const words = String(labels[i]).split(" ");
    ctx.fillText(words.slice(0,2).join(" ").slice(0,14), x, padT+ih+7);
    if(words.length>2) ctx.fillText(words.slice(2).join(" ").slice(0,14), x, padT+ih+19);
  });
}

function levelBar(it){
  const full = Math.max(it.alarm*3, 1), p = Math.max(0, Math.min(100, it.stock/full*100));

function exportCSV(name, head, rows){

}

function importItems(inp){
  if(!canWrite()) return;
  const f = inp.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try{
      const rows = parseCSV(String(rd.result));
      if(rows.length < 2) return toast("CSV file is empty");
      const head = rows[0].map(h => String(h).trim().toLowerCase());
      const col = n => head.findIndex(h => h.indexOf(n) !== -1);
      const ci = { cat: col("categor"), grp: col("group"), desc: col("desc"), uomIn: col("uom in"), mult: col("multiply"), uomOut: col("uom out"), loc: col("location"), alarm: col("alarm"), price: col("price"), stock: col("stock") };
      if(ci.desc === -1) return toast("CSV must have a Description column");
      const num = (r, idx, dflt) => { if(idx === -1) return dflt; const v = Number(String(r[idx]||"").replace(/[^0-9.\-]/g,"")); return isNaN(v) ? dflt : v; };
      let added = 0, skipped = 0;
      rows.slice(1).forEach((r, k) => {
        const desc = String(r[ci.desc]||"").trim();
        if(!desc) return;
        if(DB.items.some(i => i.desc.toLowerCase() === desc.toLowerCase())){ skipped++; return; }
        const catName = (ci.cat !== -1 ? String(r[ci.cat]||"").trim() : "") || "General";
        let cat = DB.categories.find(c => c.name.toLowerCase() === catName.toLowerCase());
        if(!cat){ cat = { id: "c" + Date.now() + "_" + k, code: String(DB.categories.length + 1).padStart(2,"0"), name: catName }; DB.categories.push(cat); }
        const grpName = (ci.grp !== -1 ? String(r[ci.grp]||"").trim() : "") || "General";
        let grp = DB.groups.find(g => g.catId === cat.id && g.name.toLowerCase() === grpName.toLowerCase());
        if(!grp){ grp = { id: "g" + Date.now() + "_" + k, code: String(DB.groups.filter(x => x.catId === cat.id).length + 1).padStart(2,"0"), catId: cat.id, name: grpName }; DB.groups.push(grp); }
        const uomIn = (ci.uomIn !== -1 ? String(r[ci.uomIn]||"").trim() : "") || "Pcs";
        DB.items.push({
          id: "i" + Date.now() + "_" + k,
          sl: DB.items.reduce((m,i) => Math.max(m, i.sl||0), 0) + 1,
          catId: cat.id, groupId: grp.id, desc,
          uomIn,
          mult: Math.max(1, num(r, ci.mult, 1)),
          uomOut: (ci.uomOut !== -1 ? String(r[ci.uomOut]||"").trim() : "") || uomIn,
          loc: ci.loc !== -1 ? String(r[ci.loc]||"").trim() : "",
          alarm: num(r, ci.alarm, DB.settings.alarmDefault),
          price: num(r, ci.price, 0),
          stock: num(r, ci.stock, 0)
        });
        added++;
      });
      if(added){ audit("Imported " + added + " items from CSV"); save(); renderAll(); }
      toast(added + " items imported" + (skipped ? " \u00b7 " + skipped + " duplicate skipped" : ""));
    }catch(e){ console.error(e); toast("Could not read CSV file"); }
    inp.value = "";
  };
  rd.readAsText(f);
}
function parseCSV(text){
  if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = []; let row = [], cell = "", q = false;
  for(let i = 0; i < text.length; i++){
    const ch = text[i];
    if(q){
      if(ch === '"'){ if(text[i+1] === '"'){ cell += '"'; i++; } else q = false; }
      else cell += ch;
    }
    else if(ch === '"') q = true;
    else if(ch === ','){ row.push(cell); cell = ""; }
    else if(ch === '\n' || ch === '\r'){ if(ch === '\r' && text[i+1] === '\n') i++; row.push(cell); cell = ""; if(row.some(c => String(c).trim() !== "")) rows.push(row); row = []; }
    else cell += ch;
  }
  row.push(cell); if(row.some(c => String(c).trim() !== "")) rows.push(row);
  return rows;
}

      <tr style="background:#eee"><th align="left">Code</th><th align="left">Item Description</th><th align="right">Qty</th><th align="left">Unit</th></tr>
      <tr><td>${itemCode(it)}</td><td>${esc(itemName(it))}</td><td align="right">${Math.abs(t.qty)}</td><td>${it?esc(it.uomOut):""}</td></tr>

  openModal(`<h3>Qty Adjustment</h3><div class="sub">Set the actual counted stock \u2014 the difference is recorded</div>
  <div class="field"><label>Item *</label><select class="select" id="fItem" onchange="adHint()">${opts(DB.items,null,i=>itemCode(i)+" \u00b7 "+i.desc)}</select></div>

function submitAD(){
  const it = itemById($("#fItem").value);
  if(!it) return toast("Please select an item");

  const q = Math.max(0, Number($("#fQty").value)), reason = $("#fReason").value.trim();

  const delta = q - it.stock;
  if(delta === 0) return toast("No difference \u2014 nothing to adjust");
  it.stock = q;
  DB.txns.unshift({ id:nextSeq("ad","AD-"), type:"ADJ", date:$("#fDate").value||todayISO(), itemId:it.id, qty:delta, reason, by:currentUser.username });
  audit(`Adjustment: ${delta>0?"+":""}${delta} ${it.uomOut} \u2014 ${it.desc} (${reason})`);
  save(); closeModal(); renderAll(); toast("Adjustment applied");
}

  <div id="reqLines">${reqLinesHtml()}</div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitReq()">Create Requisition</button></div>`, true);
  window.refreshReqLines = () => { $("#reqLines").innerHTML = reqLinesHtml(); };
  window.addReqLine = () => {
    const itemId = $("#fLineItem").value, qty = Number($("#fLineQty").value);
    if(!qty || qty<=0) return toast("Qty must be at least 1");
    const ex = REQ_LINES.find(l=>l.itemId===itemId);
    if(ex) ex.qty += qty; else REQ_LINES.push({itemId, qty});
    refreshReqLines();
  };
}
function submitReq(){
  if(REQ_LINES.length===0) return toast("Add at least one item");
  const q = { id:"q"+Date.now(), no:nextSeq("req","REQ-"), jobId:$("#fJob").value, requisitorId:$("#fReqr").value, date:todayISO(), status:"Pending", lines:REQ_LINES.slice() };
  DB.requisitions.push(q);
  audit("Created requisition "+q.no);
  save(); closeModal(); renderAll(); toast(q.no+" created");
}
function viewReq(id){
  const q = byId(DB.requisitions,id); if(!q) return;
  const j = byId(DB.jobs,q.jobId), r = byId(DB.requisitors,q.requisitorId);
  const lines = q.lines.map(l => { const it = itemById(l.itemId);
    const short = it && q.status!=="Issued" && l.qty > it.stock;
    return `<tr><td>${esc(itemName(it))}<div style="font-size:11px;color:var(--faint)">${itemCode(it)}</div></td><td class="num">${l.qty} ${it?esc(it.uomOut):""}</td><td class="num">${it?it.stock:"\u2014"}</td><td>${short?'<span class="badge out">SHORT</span>':'<span class="badge ok">OK</span>'}</td></tr>`; }).join("");
  const canAct = currentUser.access !== "Viewer";
  openModal(`<h3>${esc(q.no)} <span class="badge ${q.status.toLowerCase()}" style="vertical-align:2px">${q.status.toUpperCase()}</span></h3>
  <div class="sub">${fmtD(q.date)} \u00b7 ${j?esc(j.no+" \u2014 "+j.client):""} \u00b7 ${r?esc(r.name+" ("+r.dept+")"):""}</div>
  <table><thead><tr><th>Item</th><th class="num">Requested</th><th class="num">In Stock</th><th>Check</th></tr></thead><tbody>${lines}</tbody></table>
  <div class="modal-actions">
    <button class="btn" onclick="closeModal()">Close</button>
    ${canAct && q.status==="Pending" ? `<button class="btn btn-danger-soft" onclick="setReqStatus('${q.id}','Rejected')">Reject</button><button class="btn btn-primary" onclick="setReqStatus('${q.id}','Approved')">Approve</button>` : ""}
    ${canAct && q.status==="Approved" ? `<button class="btn btn-green" onclick="issueReq('${q.id}')">Issue All from Store</button>` : ""}
  </div>`, true);
}
function setReqStatus(id, st){
  const q = byId(DB.requisitions,id); q.status = st;
  audit(q.no+" "+st.toLowerCase()); save(); closeModal(); renderAll(); toast(q.no+" "+st.toLowerCase());
}
function issueReq(id){
  const q = byId(DB.requisitions,id);
  for(const l of q.lines){ const it = itemById(l.itemId);
    if(!it) return toast("An item in this requisition was deleted");
    if(l.qty > it.stock) return toast(`Not enough stock for ${it.desc} \u2014 only ${it.stock} ${it.uomOut} available`);
  }
  q.lines.forEach(l => { const it = itemById(l.itemId);
    it.stock -= l.qty;
    DB.txns.unshift({ id:nextSeq("so","SO-"), type:"OUT", date:todayISO(), itemId:it.id, qty:-l.qty, jobId:q.jobId, requisitorId:q.requisitorId, note:"Against "+q.no, by:currentUser.username });
  });
  q.status = "Issued";
  audit("Issued "+q.no+" ("+q.lines.length+" items)");
  save(); closeModal(); renderAll(); toast(q.no+" issued \u2014 stock updated");
}

/* ---------- reports ---------- */
let REP = { type:"txns", from:daysAgo(29), to:todayISO() }, REP_OUT = null;
const REP_TYPES = [
  ["txns","All Transactions (date range)"],
  ["stockcat","Stock by Category"],
  ["jobwise","Job-wise Consumption"],
  ["reqrwise","Requisitor-wise Issue"],
  ["supwise","Supplier-wise Receiving"],
  ["lowstock","Low Stock / Alarm Report"]
];
function runReport(){
  const from = REP.from, to = REP.to;
  const inRange = t => t.date >= from && t.date <= to;
  let title = REP_TYPES.find(x=>x[0]===REP.type)[1] + ` (${fmtD(from)} \u2013 ${fmtD(to)})`;
  let head = [], rows = [];
  if(REP.type==="txns"){
    head = ["ID","Date","Type","Item","Qty","Job/Supplier","Requisitor","By"];
    rows = DB.txns.filter(inRange).map(t => { const it = itemById(t.itemId), j = t.jobId?byId(DB.jobs,t.jobId):null, s = t.supplierId?byId(DB.suppliers,t.supplierId):null, r = t.requisitorId?byId(DB.requisitors,t.requisitorId):null;
      return [t.id, t.date, t.type, itemName(it), t.qty+" "+(it?it.uomOut:""), j?j.no:s?s.name:(t.reason||""), r?r.name:"", t.by||""]; });
  } else if(REP.type==="stockcat"){
    title = "Stock by Category (current)"; head = ["Category","Items","Total Units","Stock Value (Tk)"];
    rows = DB.categories.map(c => { const its = DB.items.filter(i=>i.catId===c.id);
      return [c.code+" \u00b7 "+c.name, its.length, its.reduce((s,i)=>s+i.stock,0), Math.round(its.reduce((s,i)=>s+i.stock*(i.price/(i.mult||1)),0))]; });
  } else if(REP.type==="jobwise"){
    head = ["Job","Client","Item","Net Used","Value (Tk)"];
    DB.jobs.forEach(j => { const used = {};
      DB.txns.filter(t=>t.jobId===j.id && inRange(t)).forEach(t => {
        if(t.type==="OUT") used[t.itemId] = (used[t.itemId]||0) - t.qty;
        if(t.type==="RET") used[t.itemId] = (used[t.itemId]||0) - t.qty;
      });
      Object.keys(used).forEach(iid => { const it = itemById(iid); if(used[iid]>0) rows.push([j.no, j.client, itemName(it), used[iid]+" "+(it?it.uomOut:""), Math.round(used[iid]*(it?(it.price/(it.mult||1)):0))]); });
    });
  } else if(REP.type==="reqrwise"){
    head = ["Requisitor","Department","Item","Issued","Value (Tk)"];
    DB.requisitors.forEach(r => { const used = {};
      DB.txns.filter(t=>t.requisitorId===r.id && t.type==="OUT" && inRange(t)).forEach(t => { used[t.itemId] = (used[t.itemId]||0) - t.qty; });
      Object.keys(used).forEach(iid => { const it = itemById(iid); rows.push([r.name, r.dept, itemName(it), used[iid]+" "+(it?it.uomOut:""), Math.round(used[iid]*(it?(it.price/(it.mult||1)):0))]); });
    });
  } else if(REP.type==="supwise"){
    head = ["Supplier","Item","Received","Value (Tk)"];
    DB.suppliers.forEach(s => { const got = {};
      DB.txns.filter(t=>t.supplierId===s.id && t.type==="IN" && inRange(t)).forEach(t => { got[t.itemId] = (got[t.itemId]||0) + t.qty; });
      Object.keys(got).forEach(iid => { const it = itemById(iid); rows.push([s.name, itemName(it), got[iid]+" "+(it?it.uomOut:""), Math.round(got[iid]*(it?(it.price/(it.mult||1)):0))]); });
    });
  } else if(REP.type==="lowstock"){
    title = "Low Stock / Alarm Report (current)"; head = ["Code","Item","Location","Stock","Alarm","Shortage"];
    rows = lowItems().map(it => [itemCode(it), it.desc, it.loc||"", it.stock+" "+it.uomOut, it.alarm, Math.max(0,it.alarm-it.stock)]);
  }
  REP_OUT = { title, head, rows };
  renderReports();
}
function renderReports(){
  $("#view-reports").innerHTML = `
  <div class="page-head"><div><div class="crumb">Insight / <b>Reports</b></div><h1>Reports</h1><p>Run, print or export any report</p></div></div>
  <div class="card" style="margin-bottom:16px">
    <div class="filter-bar" style="margin-bottom:0">
      <select class="select" onchange="REP.type=this.value;runReport()">${REP_TYPES.map(x=>`<option value="${x[0]}" ${REP.type===x[0]?"selected":""}>${x[1]}</option>`).join("")}</select>
      <input class="input" type="date" style="width:auto" value="${REP.from}" onchange="REP.from=this.value;runReport()">
      <span style="color:var(--faint)">to</span>
      <input class="input" type="date" style="width:auto" value="${REP.to}" onchange="REP.to=this.value;runReport()">
      <button class="btn btn-primary" onclick="runReport()">Run Report</button>
      ${REP_OUT?`<button class="btn" onclick="exportCSV('report.csv',REP_OUT.head,REP_OUT.rows)">\u2913 CSV</button><button class="btn" onclick="window.print()">\ud83d\udda8 Print</button>`:""}
    </div>
  </div>
  ${REP_OUT?`<div class="table-card"><div style="padding:14px 16px 0"><h3 style="font-size:14.5px">${esc(REP_OUT.title)}</h3><div class="sub">${REP_OUT.rows.length} rows</div></div>
  <div class="table-scroll"><table><thead><tr>${REP_OUT.head.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>
  ${REP_OUT.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("") || `<tr><td colspan="${REP_OUT.head.length}" style="text-align:center;color:var(--faint);padding:30px">No data in this range</td></tr>`}
  </tbody></table></div></div>`:`<div class="card" style="text-align:center;padding:40px;color:var(--muted)">Select a report and press <b>Run Report</b></div>`}`;
}

/* ---------- users (Firebase roles) ---------- */
let ROLES = [];
function accessOf(role){ role = String(role||"").toLowerCase(); return role==="admin" ? "Admin" : (role==="staff"||role==="store") ? "Store" : "Viewer"; }
function renderUsers(){
  $("#view-users").innerHTML = `<div class="page-head"><div><div class="crumb">Administration / <b>Users</b></div><h1>Users &amp; Access</h1><p>Loading\u2026</p></div></div>`;
  fdb.collection("roles").get().then(s => {
    if(CURRENT_VIEW !== "users") return;
    ROLES = s.docs.map(d => Object.assign({ email: d.id }, d.data()));
    $("#view-users").innerHTML = `
  <div class="page-head"><div><div class="crumb">Administration / <b>Users</b></div><h1>Users &amp; Access</h1><p>Admin: full access \u00b7 Store: daily operations \u00b7 Viewer: read-only</p></div>
    <div class="page-actions"><button class="btn btn-primary" onclick="userModal()">+ Add User</button></div></div>
  <div class="callout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg><div><b>New user = 2 steps:</b> 1) Firebase Console \u2192 Authentication \u2192 Add user (email + password) &nbsp;2) Ekhane same email add kore role din.</div></div>
  <div class="table-card"><div class="table-scroll"><table><thead><tr><th>Email</th><th>Name</th><th>Access</th><th></th></tr></thead><tbody>
  ${ROLES.map(r => { const acc = accessOf(r.role); return `<tr><td class="type-cell">${esc(r.email)}${r.email===currentUser.id?' <span style="color:var(--faint);font-size:11px">(you)</span>':""}</td><td>${esc(r.name||"\u2014")}</td><td><span class="badge ${acc.toLowerCase()}">${acc.toUpperCase()}</span></td>
    <td style="white-space:nowrap"><button class="btn btn-sm" onclick="userModal('${esc(r.email)}')">Edit</button> <button class="btn btn-sm btn-danger-soft" onclick="delUser('${esc(r.email)}')">Delete</button></td></tr>`; }).join("") || `<tr><td colspan="4" style="text-align:center;color:var(--faint);padding:30px">No users yet \u2014 add your team</td></tr>`}
  </tbody></table></div></div>`;
  }).catch(() => { if(CURRENT_VIEW==="users") toast("Could not load users"); });
}
function userModal(email){
  const r = email ? ROLES.find(x => x.email === email) : null;
  openModal(`<h3>${r ? "Edit" : "Add"} User</h3><div class="sub">${r ? esc(r.email) : "Step 1: create this login in Firebase Console \u2192 Authentication first"}</div>
  ${r ? "" : `<div class="field"><label>Email *</label><input class="input" id="fEmail" placeholder="name@sml.com"></div>`}
  <div class="field"><label>Full Name</label><input class="input" id="fName" value="${r?esc(r.name||""):""}"></div>
  <div class="field"><label>Access Type</label><select class="select" id="fAccess">${["Admin","Store","Viewer"].map(a=>`<option ${r&&accessOf(r.role)===a?"selected":""}>${a}</option>`).join("")}</select></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitUser('${r?esc(r.email):""}')">Save</button></div>`);
}
function submitUser(email){
  const em = (email || $("#fEmail").value.trim()).toLowerCase();
  if(!em || em.indexOf("@") === -1) return toast("Valid email is required");
  const acc = $("#fAccess").value;
  if(em === currentUser.id && acc !== "Admin") return toast("You cannot remove your own Admin access");
  const role = acc === "Admin" ? "admin" : acc === "Store" ? "staff" : "viewer";
  fdb.collection("roles").doc(em).set({ role, name: $("#fName").value.trim() }, { merge: true }).then(() => {
    audit((email ? "Edited" : "Added") + " user: " + em); save();
    closeModal(); toast("User saved"); renderUsers();
  }).catch(() => toast("Could not save user \u2014 check permission"));
}
function delUser(email){
  if(email === currentUser.id) return toast("You cannot delete your own account");
  if(!confirm(`Remove access for "${email}"?\nAlso delete the login from Firebase Console \u2192 Authentication.`)) return;
  fdb.collection("roles").doc(email).delete().then(() => {
    audit("Removed user: " + email); save(); toast("User removed"); renderUsers();
  }).catch(() => toast("Could not remove user"));
}

/* ---------- audit trail ---------- */
let AUDIT_Q = "";
function renderAudit(){
  const rows = DB.audit.filter(a => !AUDIT_Q || a.action.toLowerCase().includes(AUDIT_Q) || a.user.toLowerCase().includes(AUDIT_Q)).slice(0,300);
  $("#view-audit").innerHTML = `
  <div class="page-head"><div><div class="crumb">Administration / <b>Audit Trail</b></div><h1>Audit Trail</h1><p>Who did what, and when</p></div>
    <div class="page-actions"><button class="btn" onclick="exportCSV('audit-trail.csv',['Date','Time','User','Action'],DB.audit.map(a=>[a.date,a.time,a.user,a.action]))">\u2913 Export CSV</button></div></div>
  <div class="filter-bar"><div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input class="input" placeholder="Search action or user\u2026" value="${esc(AUDIT_Q)}" oninput="AUDIT_Q=this.value.toLowerCase();renderAudit();document.querySelector('#view-audit .input').focus()"></div></div>
  <div class="table-card"><div class="table-scroll"><table><thead><tr><th>Date</th><th>Time</th><th>User</th><th>Action</th></tr></thead><tbody>
  ${rows.map(a=>`<tr><td>${fmtD(a.date)}</td><td class="muted">${esc(a.time)}</td><td class="type-cell">${esc(a.user)}</td><td>${esc(a.action)}</td></tr>`).join("") || `<tr><td colspan="4" style="text-align:center;color:var(--faint);padding:30px">No log entries</td></tr>`}
  </tbody></table></div></div>`;
}

/* ---------- settings ---------- */
function renderSettings(){
  $("#view-settings").innerHTML = `
  <div class="page-head"><div><div class="crumb">Administration / <b>Settings</b></div><h1>Settings</h1><p>Company info &amp; data management</p></div></div>
  <div class="grid-2">
    <div class="card"><h3>Company</h3><div class="sub">Shown on slips and reports</div>
      <div class="field"><label>Company Name</label><input class="input" id="stCompany" value="${esc(DB.settings.company)}"></div>
      <div class="field"><label>Address</label><input class="input" id="stAddress" value="${esc(DB.settings.address)}"></div>
      <div class="field"><label>Default Alarm Qty (new items)</label><input class="input" id="stAlarm" type="number" min="0" value="${DB.settings.alarmDefault}"></div>
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button></div>
    <div class="card"><h3>Data Backup</h3><div class="sub">All data is saved in Firebase cloud \u2014 still, regular backups are a good habit</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-green" onclick="backupData()">\u2913 Download Backup (JSON)</button>
        <label class="btn" style="cursor:pointer">\u2912 Restore Backup<input type="file" accept=".json" style="display:none" onchange="restoreData(this)"></label>
        <button class="btn" onclick="resetData()">Reset to Demo Data</button>
        <button class="btn btn-danger-soft" onclick="clearData()">Clear All Data (fresh start)</button>
      </div>
      <div class="hint" style="margin-top:12px">Backup file contains everything: items, transactions, jobs, requisitions, audit log. Logins &amp; roles are managed in Firebase Console.</div></div>
  </div>`;
}
function saveSettings(){
  DB.settings.company = $("#stCompany").value.trim() || "Step Media Ltd";
  DB.settings.address = $("#stAddress").value.trim();
  DB.settings.alarmDefault = Math.max(0, Number($("#stAlarm").value)||5);
  audit("Updated settings"); save();
  $("#tbCompany").textContent = "\u00b7 " + DB.settings.company;
  toast("Settings saved");
}
function backupData(){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(DB,null,1)], {type:"application/json"}));
  a.download = "sml-inventory-backup-"+todayISO()+".json"; a.click(); URL.revokeObjectURL(a.href);
  audit("Downloaded backup"); save(); toast("Backup downloaded");
}
function restoreData(inp){
  const f = inp.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = async () => {
    try{
      const d = JSON.parse(rd.result);
      if(!d.items || !d.txns || !d.settings) throw new Error("bad file");
      if(!confirm("Restore this backup? Current cloud data will be replaced for everyone.")) return;
      toast("Restoring\u2026 please wait");
      await wipeColl("erp_txns"); await wipeColl("erp_audit");
      DB = d; DB.txns = DB.txns || []; DB.audit = DB.audit || [];
      SAVED_TXN = new Set(); SAVED_AUDIT = new Set();
      audit("Restored from backup");
      await doSave(); renderAll(); toast("Backup restored");
    }catch(e){ console.error(e); toast("Invalid backup file"); }
  };
  rd.readAsText(f);
}
async function resetData(){
  if(!confirm("Reset ALL data back to demo data? This cannot be undone and affects everyone.")) return;
  toast("Resetting\u2026 please wait");
  await wipeColl("erp_txns"); await wipeColl("erp_audit");
  DB = seedData();
  SAVED_TXN = new Set(); SAVED_AUDIT = new Set();
  await doSave(); renderAll(); toast("Demo data restored");
}
async function clearData(){
  if(!confirm("Delete ALL items, transactions, jobs \u2014 everything? Start completely fresh? This affects everyone.")) return;
  toast("Clearing\u2026 please wait");
  await wipeColl("erp_txns"); await wipeColl("erp_audit");
  const st = DB.settings;
  DB = { settings: st, seq:{si:0,so:0,rt:0,ad:0,req:0,job:0}, categories:[], groups:[], items:[], suppliers:[], procurers:[], requisitors:[], jobs:[], requisitions:[], txns:[], audit:[] };
  SAVED_TXN = new Set(); SAVED_AUDIT = new Set();
  audit("Cleared all data \u2014 fresh start");
  await doSave(); renderAll(); toast("All clear \u2014 fresh start!");
}

/* ---------- router & init ---------- */
const VIEWS = {
  dashboard:renderDashboard, items:renderItems, catalog:renderCatalog, stockin:renderStockIn,
  stockout:renderStockOut, returns:renderReturns, adjustments:renderAdjustments, alerts:renderAlerts,
  requisitions:renderRequisitions, suppliers:renderSuppliers, procurers:renderProcurers,
  jobs:renderJobs, requisitors:renderRequisitors, reports:renderReports,
  users:renderUsers, audit:renderAudit, settings:renderSettings
};
function show(view){
  if(!VIEWS[view]) view = "dashboard";
  if(!isAdmin() && ["users","audit","settings"].includes(view)) view = "dashboard";
  CURRENT_VIEW = view;
  if(location.hash.slice(1) !== view){ try{ history.replaceState(null,"","#"+view); }catch(e){} }
  document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
  $("#view-"+view).classList.add("active");
  document.querySelectorAll(".nav-item").forEach(b => b.classList.toggle("active", b.dataset.view===view));
  $("#alertBadge").textContent = lowItems().length;
  VIEWS[view]();
  $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("open");
  window.scrollTo(0,0);
}
function renderAll(){
  $("#alertBadge").textContent = lowItems().length;
  if(currentUser && VIEWS[CURRENT_VIEW]) VIEWS[CURRENT_VIEW]();
}
document.querySelectorAll(".nav-item").forEach(b => b.addEventListener("click", () => show(b.dataset.view)));
window.addEventListener("hashchange", () => { if(currentUser) show(location.hash.slice(1) || "dashboard"); });
$("#hamburger").addEventListener("click", () => { $("#sidebar").classList.toggle("open"); $("#scrim").classList.toggle("open"); });
$("#scrim").addEventListener("click", () => { $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("open"); });
let rsz; window.addEventListener("resize", () => { clearTimeout(rsz); rsz = setTimeout(() => { if(currentUser && CURRENT_VIEW==="dashboard") renderDashboard(); }, 200); });
function tick(){
  $("#clock").textContent = new Date().toLocaleString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
setInterval(tick, 30000); tick();

$("#lgUser").focus();
fauth.onAuthStateChanged(async fu => {
  if(!fu){ $("#loginWrap").style.display = ""; currentUser = null; return; }
  try{
    const rs = await fdb.collection("roles").doc(fu.email).get();
    const rd = rs.exists ? rs.data() : {};
    const role = String(rd.role || "").toLowerCase();
    const access = role === "admin" ? "Admin" : (role === "staff" || role === "store") ? "Store" : "Viewer";
    await loadData();
    enterApp({ id: fu.email, email: fu.email, name: rd.name || fu.email.split("@")[0], username: fu.email.split("@")[0], access });
    attachListeners();
    if(!rs.exists) toast("No role assigned \u2014 view-only. Ask admin to add you in Users.");
    audit("Logged in"); save();
  }catch(err){
    console.error(err);
    const el = $("#loginErr"); el.style.display = "block";
    el.textContent = "Could not load data. Check internet and try again.";
    fauth.signOut();
  }
  const btn = document.querySelector("#loginForm button");
  if(btn){ btn.disabled = false; btn.textContent = "Sign in"; }
});

</script>
</body>
